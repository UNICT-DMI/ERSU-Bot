[tool.isort]
profile = "black"

[tool.mypy]
ignore_missing_imports = true
# Relax strict optional checking
no_implicit_optional = false
# Allow untyped definitions
allow_untyped_defs = true
allow_incomplete_defs = true
disable_error_code = [
    "misc",
    "union-attr",
    "attr-defined",
    "index",
    "operator",
    "arg-type",
    "assignment",
    "call-arg",
    "return",
    "var-annotated",
    "no-redef",
]
