name: lint

on:
  push:
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "docs/**"

jobs:
  build:
    uses: unict-dmi/reusable-workflows/.github/workflows/python-lint.yml@main
    with:
      repo_ref: ${{ github.repository }}